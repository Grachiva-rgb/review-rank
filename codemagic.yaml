workflows:

  # ─────────────────────────────────────────────────────────────────
  # Android build — produces a signed APK you can install directly
  # or upload to Google Play (requires $25 one-time Play Console fee)
  # ─────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      groups:
        - reviewrank_credentials   # Codemagic → Team → Global variables
      vars:
        CAPACITOR_SERVER_URL: $VERCEL_URL
        KEYSTORE_PATH: /tmp/reviewrank-release.keystore
        KEY_ALIAS: reviewrank
        KEY_PASSWORD: reviewrank2024
        STORE_PASSWORD: reviewrank2024
      node: 22.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Create web placeholder for Capacitor
        script: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://review-rank.vercel.app"></head><body></body></html>' > out/index.html

      - name: Capacitor sync
        script: npx cap sync android

      - name: Generate keystore (first-time only)
        script: |
          keytool -genkeypair \
            -alias $KEY_ALIAS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore $KEYSTORE_PATH \
            -storepass $STORE_PASSWORD \
            -keypass $KEY_PASSWORD \
            -dname "CN=ReviewRank, OU=Mobile, O=ReviewRank, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Configure Gradle signing
        script: |
          cat >> android/app/build.gradle << 'EOF'

          android.signingConfigs {
              release {
                  storeFile file(System.getenv("KEYSTORE_PATH"))
                  storePassword System.getenv("STORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF

      - name: Build signed APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

